<main class="main-content page page--cart">
	<section class="section section--cart" aria-labelledby="cart-title">
		<div class="layout__container cart-layout">
			<div class="cart-list" id="cart-list">
				<h1 class="cart-list__title" id="cart-title">Tu carrito</h1>
				<article class="cart-item">
					<div class="cart-item__media">Sprint Pro X1</div>
					<div class="cart-item__content">
						<h2 class="cart-item__title">Zapatillas Sprint Pro X1</h2>
						<p class="cart-item__meta">Talla: 42 · Color: azul</p>
					</div>
					<p class="cart-item__qty">1 ud.</p>
					<p class="cart-item__price">129,95 €</p>
				</article>

				<article class="cart-item">
					<div class="cart-item__media">Camiseta AeroDry</div>
					<div class="cart-item__content">
						<h2 class="cart-item__title">Camiseta técnica AeroDry</h2>
						<p class="cart-item__meta">Talla: M · Color: negro</p>
					</div>
					<p class="cart-item__qty">1 ud.</p>
					<p class="cart-item__price">34,90 €</p>
				</article>
			</div>

			<aside class="cart-summary" aria-label="Resumen de compra">
				<h2 class="cart-summary__title">Resumen</h2>
				<div class="cart-summary__line"><span>Subtotal</span><span>164,85 €</span></div>
				<div class="cart-summary__line"><span>Envío</span><span>4,95 €</span></div>
				<div class="cart-summary__line cart-summary__line--total"><span>Total</span><span>169,80 €</span></div>
				<a class="button button--primary cart-summary__button" routerLink="/gracias">Finalizar pedido</a>
				<a class="button button--ghost cart-summary__button" routerLink="/productos">Seguir comprando</a>
			</aside>
		</div>
	</section>
</main>
